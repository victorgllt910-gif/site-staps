<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CV</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pdf-wrapper {
      width: 100%;
      max-width: 700px;
      height: 500px;
      border: 2px solid var(--noir);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 16px;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pdf-wrapper embed {
      width: 100%;
      height: 100%;
    }
    .pdf-placeholder {
      text-align: center;
      color: var(--texte-light);
    }
    .pdf-placeholder .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .pdf-placeholder p {
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="page-tag">02 — CV</div>
  <h1>MON <span>CV</span></h1>
  <div class="divider"></div>

  <p>Consulte et télécharge mon CV au format PDF ci-dessous.</p>

  <a class="btn accent" href="cv.pdf" download>⬇ Télécharger mon CV</a>

  <div class="pdf-wrapper">
    <!-- Remplace "cv.pdf" par le nom exact de ton fichier PDF -->
    <embed src="cv.pdf" type="application/pdf" />
    <!-- Si le PDF ne s'affiche pas, ce message apparaîtra -->
  </div>

  <p style="margin-top: 16px; font-size: 0.8rem; color: var(--texte-light);">
    Si le PDF ne s'affiche pas directement, utilise le bouton de téléchargement ci-dessus.
  </p>

</body>
</html>
